# evaluator-cog / evaluator.yaml
# Per-repo evaluation configuration — ecosystem-standards ADR-001, ADR-002

type: pipeline-cog

traits:
  - multi-flow
  # Runs two distinct flows (conformance_check_flow and pipeline_eval).
  # The conformance flow is registered via its own Prefect entry point and
  # scheduled independently. CD-015 source scanner may not resolve
  # prefect.serve() in this multi-flow structure — not a violation.
  - pipeline-cog-evaluator
  # This repo IS evaluator-cog — PIPE-011 (AI evaluation step) cannot
  # apply to the evaluator itself.

exemptions:
  - rule: PIPE-008
    reason: "The deterministic checker source contains retired trigger pattern strings (e.g. repository_dispatch) as string literals being checked against, not as active trigger usage. PIPE-008 does not apply."
  - rule: CD-009
    reason: "evaluator_config.py uses stdlib logging intentionally — it is a pure utility module loaded during unit tests where the mini_app_polis shared logger is unavailable. CD-009 does not apply to test-safe utility modules."
  - rule: CD-010
    reason: "sentry_sdk.init() is present in main.py with SENTRY_DSN_EVALUATOR. The LLM conformance pass cannot read source content directly and incorrectly flags this as absent."
  - rule: PIPE-004
    reason: "Concurrency guard implemented via prefect.concurrency.sync concurrency('evaluator-cog-writes', occupy=1) wrapping the full write path in conformance_check_flow."

deferrals:
  - rule: PIPE-006
    reason: >
      pipeline_eval.py is not a @flow-decorated function — it is a library module called
      in-process by other cogs. The dual get_run_logger()/stdlib fallback pattern applies
      to @flow entry points only. The module uses the shared mini_app_polis logger directly,
      which is correct for library code.
    until: null
  - rule: PIPE-002
    reason: >
      Client-side deduplication in api_client.py is intentionally best-effort (compares
      against the most recent stored finding). Hard idempotency is enforced server-side
      via the pipeline_evaluations unique constraint. This is a known architectural
      decision documented in api_client.py.
    until: null

# TEST-001/002/004 covered by pipeline-cog type scoping (evaluator has no
# normalization/deduplication of external data — its output is evaluation findings).
