# evaluator-cog / evaluator.yaml
# Per-repo evaluation configuration — ecosystem-standards ADR-001, ADR-002

type: pipeline-cog

traits:
  - multi-flow
  # Runs two distinct flows (conformance_check_flow and pipeline_eval).
  # The conformance flow is registered via its own Prefect entry point and
  # scheduled independently. CD-015 source scanner may not resolve
  # prefect.serve() in this multi-flow structure — not a violation.
  - pipeline-cog-evaluator
  # This repo IS evaluator-cog — PIPE-011 (AI evaluation step) cannot
  # apply to the evaluator itself.

exemptions:
  - rule: PIPE-008
    reason: "The deterministic checker source contains retired trigger pattern strings (e.g. repository_dispatch) as string literals being checked against, not as active trigger usage. PIPE-008 does not apply."
  - rule: CD-009
    reason: "evaluator_config.py uses stdlib logging intentionally — it is a pure utility module loaded during unit tests where the mini_app_polis shared logger is unavailable. CD-009 does not apply to test-safe utility modules."

# TEST-001/002/004 covered by pipeline-cog type scoping (evaluator has no
# normalization/deduplication of external data — its output is evaluation findings).